services:
  embeddings:
    build: ./services/embeddings
    ports:
      - "8766:8766"
    volumes:
      - embeddings-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  embeddings-cache:
