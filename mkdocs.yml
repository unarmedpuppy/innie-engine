site_name: innie-engine
site_description: Persistent memory and identity for AI coding assistants
site_author: Joshua Jenquist
site_url: https://joshuajenquist.github.io/innie-engine

repo_name: joshuajenquist/innie-engine
repo_url: https://github.com/joshuajenquist/innie-engine

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.annotate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - Overview: architecture/overview.md
    - Storage Layout: architecture/storage-layout.md
    - Heartbeat Pipeline: architecture/heartbeat-pipeline.md
    - Search Engine: architecture/search-engine.md
    - Backend System: architecture/backends.md
    - Fleet Coordination: architecture/fleet.md
    - Security Model: architecture/security.md
